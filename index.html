<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Campus Media – Elevate Your Career & Social Journey</title>
    <meta name="description" content="Campus Media is a career platform for students – resume analysis, mock interviews, job board, mentorship chat, and more." />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body, #root {
        height: 100%;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        background-color: #0f172a;
        color: #f8fafc;
        -webkit-font-smoothing: antialiased;
      }
      /* Loading placeholder so users see something while JS loads */
      #root:empty::before {
        content: '';
        display: block;
        position: fixed;
        inset: 0;
        background: #0f172a;
      }
      /* Custom scrollbars */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #1e293b; }
      ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.addEventListener('error', function(e) {
        document.body.innerHTML += '<div style="color:red; background:white; padding:20px; z-index:9999; position:fixed; top:0; left:0; width:100%;"><pre>' + e.message + '\n' + e.filename + ':' + e.lineno + '</pre></div>';
      });
      window.addEventListener('unhandledrejection', function(e) {
        document.body.innerHTML += '<div style="color:red; background:white; padding:20px; z-index:9999; position:fixed; top:0; left:0; width:100%;"><pre>Unhandled Rejection: ' + (e.reason && e.reason.message || e.reason) + '</pre></div>';
      });
    </script>
    <script type="module" src="/client/src/main.jsx"></script>
  </body>
</html>
